name: Fetch GIP Data

on:
  push:
    paths:
      - 'scripts/**'
  schedule:
    - cron: '0 6 * * *'   # daily 6am UTC
  workflow_dispatch:        # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch data from data.norfolk.gov
        env:
          NORFOLK_APP_TOKEN: ${{ secrets.NORFOLK_APP_TOKEN }}
        run: python scripts/fetch_gip_data.py

      - name: Commit snapshot
        run: |
          git config user.email claude@anthropic.com
          git config user.name "GIP Data Bot"
          git add data/gip_snapshot.json
          git diff --staged --quiet || git commit -m "data: update GIP snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
